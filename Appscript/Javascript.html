<script>
  /**
   * WORKFORCE HERMES - CLIENT ENGINE
   * Handles SPA routing and Drag & Drop
   */

  const state = {
    currentView: 'dashboard',
    stats: { todoCount: 0, inProgressCount: 0, doneCount: 0, overallCompletion: 0 },
    tasks: [],
    staff: [],
    ideas: [],
    actualRole: 'Programmer', // The role from DB
    userRole: 'Programmer',   // The current view mode
    userName: '',
    isMainAdmin: false,
    expandedCards: {} // Tracks which Kanban cards have expanded milestones
  };

  function showLoading(silent = false) {
    if (silent) return;
    document.getElementById('loading-overlay').classList.remove('hidden');
  }

  function hideLoading(silent = false) {
    if (silent) return;
    document.getElementById('loading-overlay').classList.add('hidden');
  }

  function changeRole(role) {
    state.userRole = role;
    document.getElementById('user-role-badge').textContent = role;

    // Add role class to body for CSS targeting
    document.body.classList.remove('role-admin', 'role-programmer');
    document.body.classList.add('role-' + role.toLowerCase());

    const navBar = document.querySelector('.nav-bar');
    const roleSwitcher = document.getElementById('role-switcher');

    // Role switcher visibility: If actual role is Admin, always show it unless Main Admin
    if (state.isMainAdmin) {
      roleSwitcher.classList.add('hidden');
    } else if (state.actualRole === 'Admin') {
      roleSwitcher.classList.remove('hidden');
      roleSwitcher.value = role; // Sync dropdown
    } else {
      roleSwitcher.classList.add('hidden');
    }

    // Strict Tab Visibility
    const adminTabs = document.querySelectorAll('.admin-only');
    if (role === 'Programmer') {
      adminTabs.forEach(tab => tab.classList.add('hidden'));
      switchView('kanban');
    } else {
      adminTabs.forEach(tab => tab.classList.remove('hidden'));
      // Reload current view to apply new role permissions
      if (state.currentView === 'kanban') loadKanban();
      if (state.currentView === 'dashboard') loadDashboard();
    }

    navBar.classList.remove('hidden');
  }

  function switchView(viewId) {
    // Security check: Programmers cannot access admin views
    const adminViews = ['admin', 'dashboard', 'overview']; // entry and notebook are now allowed
    if (state.userRole === 'Programmer' && adminViews.includes(viewId) && viewId !== 'kanban') {
      console.warn('Access denied to view:', viewId);
      return;
    }

    state.currentView = viewId;
    document.querySelectorAll('.view-section').forEach(s => s.classList.add('hidden'));
    document.getElementById(viewId + '-view').classList.remove('hidden');

    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.querySelector(`[onclick="switchView('${viewId}')"]`)?.classList.add('active');

    if (viewId === 'dashboard') loadDashboard();
    if (viewId === 'kanban') loadKanban();
    if (viewId === 'notebook') loadNotebook();
    if (viewId === 'entry') {
      initMilestones();
      loadStaffForMultiselect();
    }
    if (viewId === 'admin') loadStaffTable();
  }

  // --- CUSTOM MULTISELECT ---
  function toggleMultiselect() {
    document.getElementById('assignee-options').classList.toggle('show');
  }

  function loadStaffForMultiselect() {
    google.script.run
      .withSuccessHandler(staff => {
        const container = document.getElementById('assignee-options');
        container.innerHTML = staff.map(s => {
          // If programmer, auto-check their own name by default
          const isMe = (state.userRole === 'Programmer' && s.name.toLowerCase() === state.userName.toLowerCase());
          return `
          <div class="multiselect-option" onclick="event.stopPropagation()">
            <input type="checkbox" id="staff-${s.email}" value="${s.name}" onchange="updateMultiselectTrigger()" ${isMe ? 'checked' : ''}>
            <label for="staff-${s.email}">${s.name}</label>
          </div>
          `;
        }).join('');
        // Ensure multiselect trigger text updates to reflect checked boxes immediately
        updateMultiselectTrigger();
      })
      .withFailureHandler(err => {
        console.error('Failed to load staff:', err);
      })
      .getStaff();
  }

  function updateMultiselectTrigger() {
    const checkboxes = document.querySelectorAll('#assignee-options input:checked');
    const trigger = document.querySelector('.multiselect-trigger');
    if (checkboxes.length === 0) {
      trigger.textContent = 'Select Assignees...';
      trigger.style.color = '#64748b';
    } else {
      const names = Array.from(checkboxes).map(cb => cb.value);
      trigger.textContent = names.join(', ');
      trigger.style.color = '#1e293b';
    }
  }

  // Close multiselect when clicking outside
  window.addEventListener('click', (e) => {
    if (!e.target.closest('.custom-multiselect')) {
      document.getElementById('assignee-options').classList.remove('show');
    }
  });

  // --- MILESTONE LOGIC ---

  const DEFAULT_MILESTONES = [
    { name: "Project Planning & Design", days: 22 },
    { name: "Project Setup & Database", days: 6 },
    { name: "Core Feature Development (Phase 1)", days: 25 },
    { name: "Core Feature Development (Phase 2)", days: 20 },
    { name: "API Integration", days: 8 },
    { name: "Internal Testing & Bug Fixes", days: 15 },
    { name: "User Testing & Refinement", days: 20 },
    { name: "Final Polish & Optimization", days: 15 },
    { name: "Deployment & Soft Launch", days: 17 },
    { name: "Post-Launch Support", days: 22 }
  ];

  let currentMilestones = [];

  function initMilestones() {
    currentMilestones = JSON.parse(JSON.stringify(DEFAULT_MILESTONES));
    renderMilestones();
  }

  function renderMilestones() {
    const container = document.getElementById('milestone-rows-container');
    container.innerHTML = '';

    currentMilestones.forEach((m, index) => {
      const row = document.createElement('div');
      row.className = 'milestone-row';
      row.innerHTML = `
        <input type="text" class="form-input" value="${m.name}" onchange="updateMilestoneData(${index}, 'name', this.value)" placeholder="Milestone Name">
        <input type="number" class="form-input" value="${m.days}" onchange="updateMilestoneData(${index}, 'days', this.value)" placeholder="Days">
        <button type="button" class="btn-remove-milestone" onclick="removeMilestoneRow(${index})">×</button>
      `;
      container.appendChild(row);
    });
    updateMilestoneGuide();
  }

  function updateMilestoneData(index, field, value) {
    if (field === 'days') value = parseInt(value) || 0;
    currentMilestones[index][field] = value;
    updateMilestoneGuide();
  }

  function addMilestoneRow() {
    currentMilestones.push({ name: '', days: 0 });
    renderMilestones();
  }

  function removeMilestoneRow(index) {
    currentMilestones.splice(index, 1);
    renderMilestones();
  }

  function updateMilestoneGuide() {
    const guideList = document.getElementById('milestone-guide-list');
    const totalDaysLabel = document.getElementById('total-days-label');

    guideList.innerHTML = '';
    let totalDays = 0;

    currentMilestones.forEach((m, index) => {
      totalDays += m.days;
      const item = document.createElement('div');
      item.className = 'guide-item';
      item.innerHTML = `
        <div class="guide-label">M${index + 1}: ${m.name || 'Unnamed Milestone'}</div>
        <div class="guide-days">(${m.days} days)</div>
      `;
      guideList.appendChild(item);
    });

    const months = (totalDays / 30).toFixed(1);
    totalDaysLabel.textContent = `Total Guided Timeline: ${totalDays} Days (~${months} Months)`;
  }

  function resetTaskForm() {
    document.querySelector('#entry-view form').reset();
    initMilestones();

    // Reset custom multiselect visual
    const trigger = document.querySelector('.multiselect-trigger');
    if (trigger) {
      trigger.textContent = 'Select Assignees...';
      trigger.style.color = '#64748b';
    }
  }

  // --- DRAG AND DROP LOGIC ---

  function allowDrop(ev) {
    ev.preventDefault();
    ev.currentTarget.classList.add('drag-over');
  }

  function drag(ev, taskId) {
    ev.dataTransfer.setData("taskId", taskId);
    ev.target.classList.add('dragging');
  }

  function drop(ev, newStatus) {
    ev.preventDefault();
    document.querySelectorAll('.kanban-col').forEach(c => c.classList.remove('drag-over'));

    const taskId = ev.dataTransfer.getData("taskId");
    const card = document.querySelector(`[data-id="${taskId}"]`);
    const container = document.getElementById(`content-${newStatus === 'development' ? 'development' : newStatus}`);

    if (card && container) {
      card.classList.remove('dragging');
      // Optimistic UI update: Bring to top
      container.prepend(card);

      // Update server
      showLoading();
      google.script.run
        .withSuccessHandler(() => {
          console.log(`Task ${taskId} moved to ${newStatus}`);
          updateTotals(); // Recalculate totals after move
          hideLoading();
        })
        .withFailureHandler(err => {
          console.error('Failed to update task status:', err);
          alert('Error updating task. Please refresh.');
          hideLoading();
        })
        .updateTaskStatus(taskId, newStatus);
    }
  }

  // Handle drag leave to remove highlight
  document.addEventListener('dragleave', (e) => {
    const col = e.target.closest('.kanban-col');
    if (col) {
      // Check if we are actually leaving the column, not just moving into a child
      const rect = col.getBoundingClientRect();
      if (e.clientX <= rect.left || e.clientX >= rect.right || e.clientY <= rect.top || e.clientY >= rect.bottom) {
        col.classList.remove('drag-over');
      }
    }
  });

  // --- DATA LOADERS ---

  function loadDashboard(silent = false) {
    showLoading(silent);
    google.script.run
      .withSuccessHandler(stats => {
        document.getElementById('stat-todo').textContent = stats.todo || 0;
        document.getElementById('stat-active').textContent = stats.development || 0;
        document.getElementById('stat-done').textContent = stats.done || 0;
        document.getElementById('stat-efficiency').textContent = (stats.overallCompletion || 0) + '%';

        const container = document.getElementById('staff-workload-container');
        if (container) {
          const workload = stats.staffWorkload || [];
          if (workload.length === 0) {
            container.innerHTML = '<p style="color:#94a3b8; font-style:italic; text-align:center;">No active or pending tasks right now.</p>';
          } else {
            container.innerHTML = workload.map(w => `
              <div style="display:flex; justify-content:space-between; align-items:center; padding:12px 15px; border-radius:12px; background:#f8fafc; margin-bottom:10px; border: 1px solid #e2e8f0;">
                <div style="font-weight:800; color:#1e293b; font-size:0.9rem;">${w.name}</div>
                <div style="display:flex; gap:10px;">
                  ${w.active > 0 ? `<span style="background:linear-gradient(135deg,#6366f1,#a5b4fc); color:white; padding:3px 10px; border-radius:12px; font-size:0.75rem; font-weight:700;">Active: ${w.active}</span>` : ''}
                  ${w.pending > 0 ? `<span style="background:linear-gradient(135deg,#f59e0b,#fcd34d); color:white; padding:3px 10px; border-radius:12px; font-size:0.75rem; font-weight:700;">Pending: ${w.pending}</span>` : ''}
                </div>
              </div>
            `).join('');
          }
        }

        hideLoading(silent);
      })
      .withFailureHandler(err => {
        console.error('Dashboard load error:', err);
        hideLoading(silent);
      })
      .getProjectStats();
  }

  function loadStaffTable(silent = false) {
    google.script.run
      .withSuccessHandler(staff => {
        const tbody = document.getElementById('staff-tbody');
        tbody.innerHTML = staff.map(s => `
          <tr>
            <td><strong>${s.name}</strong></td>
            <td>
              <select class="role-switcher" onchange="updateStaffRole('${s.email}', this.value)">
                <option value="Programmer" ${s.role === 'Programmer' ? 'selected' : ''}>Programmer</option>
                <option value="Admin" ${s.role === 'Admin' ? 'selected' : ''}>Admin</option>
              </select>
            </td>
            <td style="color:#64748b">${s.email}</td>
          </tr>
        `).join('');
      })
      .withFailureHandler(err => {
        console.error('Staff load error:', err);
      })
      .getStaff();
  }

  function updateStaffRole(email, role) {
    google.script.run.withSuccessHandler(() => {
      console.log(`Role for ${email} updated to ${role}`);
    }).updateStaffRole(email, role);
  }
  function loadKanban(silent = false) {
    showLoading(silent);
    google.script.run
      .withSuccessHandler(tasks => {
        state.tasks = tasks; // Store tasks in state
        const cols = ['todo', 'pending', 'development', 'testing', 'done', 'scrapyard'];

        // Sort tasks by lastUpdated descending (most recent first)
        tasks.sort((a, b) => b.lastUpdated - a.lastUpdated);

        // Filter for programmers: only show tasks where they are assigned
        let filteredTasks = tasks;
        if (state.userRole === 'Programmer') {
          filteredTasks = tasks.filter(t =>
            t.assignee && t.assignee.toLowerCase().includes(state.userName.toLowerCase())
          );
        }

        cols.forEach(c => {
          const el = document.getElementById(`content-${c}`);
          if (el) el.innerHTML = '';
        });

        filteredTasks.forEach(t => {
          const colId = t.status === 'inProgress' ? 'development' : t.status;
          const container = document.getElementById(`content-${colId}`);

          if (container) {
            const card = document.createElement('div');
            card.className = state.userRole === 'Programmer' ? 'programmer-card' : 'task-card';
            card.setAttribute('draggable', 'true');
            card.setAttribute('data-id', t.id);
            card.setAttribute('ondragstart', `drag(event, '${t.id}')`);
            card.onclick = () => openTaskModal(t.id);

            // Calculate progress
            const milestones = t.milestones || [];
            const totalM = milestones.length > 0 ? milestones.length : 10;
            const doneM = t.completedMilestones || 0;
            const progressPercent = Math.round((doneM / totalM) * 100);

            let canEditMilestone = true;
            if (state.actualRole === 'Admin') {
              const assigneeVal = (t.assignee || '').toLowerCase();
              const userNameVal = (state.userName || '').toLowerCase();
              if (!assigneeVal.includes(userNameVal)) {
                canEditMilestone = false;
              }
            }

            let milestoneListHtml = '';
            if (state.userRole === 'Programmer') {
              const isExpanded = state.expandedCards[t.id] || false;
              const toggleText = isExpanded ? 'Collapse' : 'Expand';
              const listClass = isExpanded ? '' : 'collapsed-view';

              milestoneListHtml = `
              <div style="background: white; border: 1px solid #e2e8f0; border-radius: 12px; padding: 15px; margin-bottom: 20px;">
                <div style="display:flex; justify-content:space-between; align-items:center; font-weight:800; color:#1e293b; margin-bottom:10px">
                  <span style="font-size: 0.75rem; color: #64748b;">Milestones: ${doneM} / ${totalM} (${progressPercent}%)</span>
                  <button type="button" class="btn-secondary" style="padding:2px 8px; font-size:0.7rem; border-radius:6px;" onclick="event.stopPropagation(); toggleMilestoneView('${t.id}')" id="btn-toggle-m-${t.id}">${toggleText}</button>
                </div>
                <div class="progress-container" style="height:8px; margin-bottom:15px; border-radius:10px;">
                  <div class="progress-fill" style="width: ${progressPercent}%; border-radius:10px;"></div>
                </div>
                
                <div style="font-size:0.65rem; color:#94a3b8; font-style:italic; margin-bottom:10px; text-align:center;">Drag milestones to reorder them</div>
                
                <div class="milestone-vertical-list ${listClass}" id="card-milestone-list-${t.id}">
                  ${milestones.map((m, idx) => {
                const allCompleted = milestones.every(ms => ms.completed);
                let status = 'waiting';
                const firstIncompleteIdx = milestones.findIndex(ms => !ms.completed);

                if (m.completed) {
                  status = 'completed';
                } else if (idx === firstIncompleteIdx) {
                  status = 'active';
                }

                let actionBtnHtml = '';
                if (canEditMilestone) {
                  if (status === 'completed') {
                    actionBtnHtml = `<button class="btn-milestone-undo" onclick="event.stopPropagation(); toggleMilestone('${t.id}', ${idx}, false)">Undo</button>`;
                  } else if (status === 'active') {
                    actionBtnHtml = `<button class="btn-milestone-complete" onclick="event.stopPropagation(); toggleMilestone('${t.id}', ${idx}, false)">Complete</button>`;
                  } else {
                    actionBtnHtml = `<span class="badge-waiting">Waiting</span>`;
                  }
                } else {
                  if (status === 'completed') {
                    actionBtnHtml = `<span class="badge-completed">Completed</span>`;
                  } else if (status === 'active') {
                    actionBtnHtml = `<span class="badge-active">Active</span>`;
                  } else {
                    actionBtnHtml = `<span class="badge-waiting">Waiting</span>`;
                  }
                }

                const completedText = m.completed && m.completedAt ?
                  `<div class="milestone-date">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M20 6L9 17l-5-5"/></svg>
                        Completed ${m.completedAt}
                      </div>` : '';

                let visibilityClass = '';
                if (status === 'active' || (allCompleted && idx === milestones.length - 1)) {
                  visibilityClass = 'm-active-or-last';
                }

                return `
                    <div class="milestone-list-item ${status} ${visibilityClass}" style="padding: 10px; gap: 10px;" draggable="${canEditMilestone}" data-idx="${idx}" ondragstart="event.stopPropagation(); dragMilestone(event, ${idx})" ondragover="allowDropMilestone(event)" ondrop="dropMilestone(event, '${t.id}', ${idx})">
                      <div class="drag-handle" style="font-size:1rem;">⋮⋮</div>
                      <div class="milestone-list-content">
                        <div class="milestone-name-row">
                          <span class="m-name ${m.completed ? 'strike' : ''}" style="font-size: 0.75rem;">${m.name} <span style="font-weight:normal; color:#94a3b8">(${m.days} days)</span></span>
                          ${actionBtnHtml}
                        </div>
                        ${completedText}
                      </div>
                    </div>
                    `;
              }).join('')}
                </div>
              </div>
              `;
            } else {
              let milestoneDots = '';
              for (let i = 1; i <= totalM; i++) {
                const isActive = i <= doneM ? 'active' : '';
                milestoneDots += `<div class="milestone-dot ${isActive}">${i}</div>`;
              }
              milestoneListHtml = `
              <div class="progress-container">
                <div class="progress-fill" style="width: ${progressPercent}%"></div>
              </div>
              <div class="milestones-grid">
                ${milestoneDots}
              </div>
              `;
            }

            card.innerHTML = `
              <div class="card-header">
                <h4>${t.title}</h4>
                <div style="font-size:0.7rem; color:#94a3b8; font-weight:700">#${t.id.slice(-4)}</div>
              </div>
              <div class="card-assignee">
                <svg class="assignee-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                ${t.assignee || 'Unassigned'}
              </div>
              ${milestoneListHtml}
              
              ${state.userRole === 'Programmer' ? `
                <div class="notes-section" onclick="event.stopPropagation()">
                  <div class="notes-header">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                    Latest Note
                  </div>
                  <div class="notes-list" id="notes-list-${t.id}">
                    ${(t.notes || []).length > 0 ? `
                      <div class="note-item">
                        <div class="note-date">${t.notes[t.notes.length - 1].date}</div>
                        <div class="note-text">${t.notes[t.notes.length - 1].text}</div>
                      </div>
                    ` : '<div style="font-size:0.7rem; color:#94a3b8; font-style:italic">No notes yet</div>'}
                  </div>
                  <div class="note-input-group">
                    <input type="text" class="note-input" id="note-input-${t.id}" placeholder="Add a note...">
                    <button class="btn-add-note" onclick="addNote('${t.id}')">Add</button>
                  </div>
                </div>
              ` : `
                <div class="card-actions">
                  <div class="action-btn" onclick="event.stopPropagation(); moveTask('${t.id}', 'todo')">To Do</div>
                  <div class="action-btn" onclick="event.stopPropagation(); moveTask('${t.id}', 'pending')">Pending</div>
                  <div class="action-btn" onclick="event.stopPropagation(); moveTask('${t.id}', 'development')">Dev</div>
                  <div class="action-btn" onclick="event.stopPropagation(); moveTask('${t.id}', 'testing')">Test</div>
                  <div class="action-btn" onclick="event.stopPropagation(); moveTask('${t.id}', 'done')">Done</div>
                  <div class="action-btn" onclick="event.stopPropagation(); moveTask('${t.id}', 'scrapyard')">Scrap</div>
                </div>
              `}
            `;
            container.appendChild(card);
          }
        });

        updateTotals();

        const modal = document.getElementById('task-modal');
        if (modal && !modal.classList.contains('hidden') && state.activeModalTaskId) {
          openTaskModal(state.activeModalTaskId);
        }

        hideLoading(silent);
      })
      .withFailureHandler(err => {
        console.error('Kanban load error:', err);
        hideLoading(silent);
      })
      .getTasks();
  }


  // --- TASK MODAL LOGIC ---

  function openTaskModal(taskId, isEditMode = false) {
    state.activeModalTaskId = taskId;
    const task = state.tasks.find(t => t.id === taskId);
    if (!task) return;

    const modal = document.getElementById('task-modal');
    const modalBody = document.getElementById('modal-body');

    // Default clone for editing
    const milestones = JSON.parse(JSON.stringify(task.milestones || []));
    const doneM = task.completedMilestones || 0;
    const progressPercent = milestones.length > 0 ? Math.round((doneM / milestones.length) * 100) : 0;

    let canEditMilestone = true;
    if (state.actualRole === 'Admin') {
      const assigneeVal = (task.assignee || '').toLowerCase();
      const userNameVal = (state.userName || '').toLowerCase();
      if (!assigneeVal.includes(userNameVal)) {
        canEditMilestone = false;
      }
    }

    // Determine Assignee HTML: static text or editable input
    let assigneeHtml = `Assigned to: ${task.assignee || 'Unassigned'}`;
    if (isEditMode) {
      const staffOptions = state.staff.map(s => `<option value="${s.name}" ${task.assignee === s.name ? 'selected' : ''}>${s.name}</option>`).join('');
      assigneeHtml = `
        <div style="display:flex; align-items:center;">
          Assigned to: 
          <select id="edit-task-assignee" class="form-input" style="flex:1; padding:4px 8px; margin-left:8px;">
            <option value="">Unassigned</option>
            ${staffOptions}
          </select>
        </div>
      `;
    }

    // Determine Top Action Button HTML
    let topActionBtn = '';
    if (isEditMode) {
      topActionBtn = `<button type="button" class="btn-primary" style="background:#3b82f6; color:white; padding:8px 16px; font-size:0.8rem; border-radius:8px;" onclick="saveTaskEdits('${task.id}')">Save Changes</button>`;
    } else if (state.userRole === 'Admin') {
      topActionBtn = `<button type="button" class="btn-secondary" style="background:#ef4444; color:white; padding:8px 16px; font-size:0.8rem; border-radius:8px;" onclick="deleteTask('${task.id}')">Delete Task</button>`;
    }

    modalBody.innerHTML = `
      <div class="modal-grid">
        <div>
          <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px;">
            <h1 class="modal-title" style="margin-bottom:0;">${task.title}</h1>
            ${topActionBtn}
          </div>
          <div class="modal-assignee">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            ${assigneeHtml}
          </div>
          
          <div class="modal-desc">
            <h3 style="font-weight:900; text-transform:uppercase; font-size:0.9rem; color:#1e293b; margin-bottom:10px">Project Description</h3>
            ${task.description || 'No description provided.'}
          </div>

          <div style="background: white; border: 1px solid #e2e8f0; border-radius: 16px; padding: 20px;">
            <div style="display:flex; justify-content:space-between; font-weight:800; color:#1e293b; margin-bottom:10px">
              <span style="font-size: 0.85rem; color: #64748b; margin: 0 auto;">Milestones: ${doneM} / ${milestones.length} (${progressPercent}%)</span>
            </div>
            <div class="progress-container" style="height:10px; margin-bottom:15px; border-radius:10px;">
              <div class="progress-fill" style="width: ${progressPercent}%; border-radius:10px;"></div>
            </div>
            
            <div style="font-size:0.75rem; color:#94a3b8; font-style:italic; margin-bottom:15px; text-align:center;">Drag milestones to reorder them</div>
                     <div class="milestone-vertical-list" id="milestone-list-${task.id}">
              ${milestones.map((m, idx) => {
      let status = 'waiting';
      const firstIncompleteIdx = milestones.findIndex(ms => !ms.completed);

      if (m.completed) {
        status = 'completed';
      } else if (idx === firstIncompleteIdx) {
        status = 'active';
      }

      let actionBtnHtml = '';
      if (isEditMode) {
        return `
                  <div class="milestone-list-item edit-mode-item" style="padding: 10px; gap: 10px;" data-idx="${idx}">
                    <div class="milestone-list-content">
                      <div class="milestone-name-row" style="gap:10px;">
                        <input type="text" class="form-input edit-m-name" value="${m.name}" placeholder="Milestone Name" style="flex:2; padding:4px 8px; font-size:0.8rem;" />
                        <input type="number" class="form-input edit-m-days" value="${m.days}" placeholder="Days" style="flex:1; padding:4px 8px; font-size:0.8rem;" />
                        <button type="button" class="btn-remove-milestone" style="padding:4px 8px; font-size:0.8rem;" onclick="this.closest('.edit-mode-item').remove()">×</button>
                      </div>
                    </div>
                  </div>
                  `;
      }

      if (canEditMilestone) {
        if (status === 'completed') {
          actionBtnHtml = `<button class="btn-milestone-undo" onclick="toggleMilestone('${task.id}', ${idx}, true)">Undo</button>`;
        } else if (status === 'active') {
          actionBtnHtml = `<button class="btn-milestone-complete" onclick="toggleMilestone('${task.id}', ${idx}, true)">Complete</button>`;
        } else {
          actionBtnHtml = `<span class="badge-waiting">Waiting</span>`;
        }
      } else {
        if (status === 'completed') {
          actionBtnHtml = `<span class="badge-completed">Completed</span>`;
        } else if (status === 'active') {
          actionBtnHtml = `<span class="badge-active">Active</span>`;
        } else {
          actionBtnHtml = `<span class="badge-waiting">Waiting</span>`;
        }
      }

      const completedText = m.completed && m.completedAt ?
        `<div class="milestone-date">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M20 6L9 17l-5-5"/></svg>
                    Completed ${m.completedAt}
                  </div>` : '';

      return `
                <div class="milestone-list-item ${status}" draggable="${canEditMilestone}" data-idx="${idx}" ondragstart="dragMilestone(event, ${idx})" ondragover="allowDropMilestone(event)" ondrop="dropMilestone(event, '${task.id}', ${idx})">
                  <div class="drag-handle">⋮⋮</div>
                  <div class="milestone-list-content">
                    <div class="milestone-name-row">
                      <span class="m-name ${m.completed ? 'strike' : ''}">${m.name} <span style="font-weight:normal; color:#94a3b8">(${m.days} days)</span></span>
                      ${actionBtnHtml}
                    </div>
                    ${completedText}
                  </div>
                </div>
                `;
    }).join('')}
            </div>
            ${isEditMode ? `<button type="button" class="btn-add-note" style="margin-top:10px; width:100%;" onclick="appendEditableMilestone('${task.id}')">+ Add Milestone</button>` : ''}
          </div>
        </div>

        <div style="background:#f8fafc; padding:30px; border-radius:20px; align-self: start;">
          <h3 style="font-weight:900; text-transform:uppercase; font-size:0.9rem; color:#1e293b; margin-bottom:20px">Notes & Updates</h3>
          <div class="notes-list" style="max-height:400px; overflow-y:auto;">
            ${(task.notes || []).map(n => `
              <div class="note-item">
                <div class="note-date">${n.date}</div>
                <div class="note-text">${n.text}</div>
              </div>
            `).join('') || '<div style="text-align:center; color:#94a3b8; font-style:italic">No notes yet</div>'}
          </div>
          <div class="note-input-group" style="margin-top:20px">
            <input type="text" class="note-input" id="modal-note-input" placeholder="Add a note...">
            <button class="btn-add-note" onclick="addNote('${task.id}', true)">Add</button>
          </div>
        </div>
      </div>
    `;

    modal.classList.remove('hidden');
  }

  function closeTaskModal(e) {
    state.activeModalTaskId = null;
    document.getElementById('task-modal').classList.add('hidden');
  }

  function appendEditableMilestone(taskId) {
    const list = document.getElementById(`milestone-list-${taskId}`);
    if (!list) return;
    const div = document.createElement('div');
    div.className = 'milestone-list-item edit-mode-item';
    div.style.padding = '10px';
    div.style.gap = '10px';
    div.innerHTML = `
      <div class="milestone-list-content">
        <div class="milestone-name-row" style="gap:10px;">
          <input type="text" class="form-input edit-m-name" placeholder="Milestone Name" style="flex:2; padding:4px 8px; font-size:0.8rem;" />
          <input type="number" class="form-input edit-m-days" placeholder="Days" style="flex:1; padding:4px 8px; font-size:0.8rem;" />
          <button type="button" class="btn-remove-milestone" style="padding:4px 8px; font-size:0.8rem;" onclick="this.closest('.edit-mode-item').remove()">×</button>
        </div>
      </div>
    `;
    list.appendChild(div);
  }

  function saveTaskEdits(taskId) {
    const task = state.tasks.find(t => t.id === taskId);
    if (!task) return;

    const assigneeInput = document.getElementById('edit-task-assignee');
    const newAssignee = assigneeInput ? assigneeInput.value.trim() : task.assignee;

    const items = document.querySelectorAll(`#milestone-list-${taskId} .edit-mode-item`);
    const newMilestones = [];

    // Maintain old milestones if possible, otherwise map defaults on new ones
    items.forEach((item, idx) => {
      const nameInput = item.querySelector('.edit-m-name');
      const daysInput = item.querySelector('.edit-m-days');
      const oldM = task.milestones[idx];

      newMilestones.push({
        name: nameInput.value.trim() || 'Unnamed',
        days: parseInt(daysInput.value) || 0,
        completed: oldM && nameInput.value.trim() === oldM.name ? oldM.completed : false,
        completedAt: oldM && nameInput.value.trim() === oldM.name ? oldM.completedAt : undefined
      });
    });

    showLoading();
    google.script.run
      .withSuccessHandler(() => {
        closeTaskModal();
        loadKanban();
      })
      .withFailureHandler(err => {
        console.error('Save task error:', err);
        hideLoading();
      })
      .updateTaskDetails(taskId, newAssignee, newMilestones);
  }

  // --- MILESTONE & NOTE ACTIONS ---

  function toggleMilestone(taskId, milestoneIdx, fromModal = false) {
    const task = state.tasks.find(t => t.id === taskId);
    if (!task) return;

    const milestones = task.milestones;
    const isNowCompleted = !milestones[milestoneIdx].completed;
    milestones[milestoneIdx].completed = isNowCompleted;

    if (isNowCompleted) {
      milestones[milestoneIdx].completedAt = new Date().toLocaleString([], { year: 'numeric', month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    } else {
      delete milestones[milestoneIdx].completedAt;
    }

    const completedCount = milestones.filter(m => m.completed).length;
    task.completedMilestones = completedCount; // Optimistic local state update

    // Optimistic UI update
    if (fromModal) {
      openTaskModal(taskId);
    }

    showLoading();

    google.script.run
      .withSuccessHandler(() => {
        // Now that server has the update, reload to sync UI across board and modal
        loadKanban();
      })
      .withFailureHandler(err => {
        console.error('Milestone update error:', err);
        hideLoading();
      })
      .updateTaskMilestones(taskId, milestones, completedCount);
  }

  function toggleMilestoneView(taskId) {
    state.expandedCards[taskId] = !state.expandedCards[taskId];
    const list = document.getElementById(`card-milestone-list-${taskId}`);
    const btn = document.getElementById(`btn-toggle-m-${taskId}`);
    if (list && btn) {
      if (state.expandedCards[taskId]) {
        list.classList.remove('collapsed-view');
        btn.textContent = 'Collapse';
      } else {
        list.classList.add('collapsed-view');
        btn.textContent = 'Expand';
      }
    }
  }

  let draggedMilestoneIdx = null;

  function dragMilestone(ev, idx) {
    draggedMilestoneIdx = idx;
    ev.dataTransfer.effectAllowed = 'move';
  }

  function allowDropMilestone(ev) {
    ev.preventDefault();
    ev.dataTransfer.dropEffect = 'move';
  }

  function dropMilestone(ev, taskId, targetIdx) {
    ev.preventDefault();
    ev.stopPropagation();

    if (draggedMilestoneIdx === null || draggedMilestoneIdx === targetIdx) return;

    const task = state.tasks.find(t => t.id === taskId);
    if (!task) return;

    const milestones = task.milestones;
    const [movedItem] = milestones.splice(draggedMilestoneIdx, 1);
    milestones.splice(targetIdx, 0, movedItem);

    const completedCount = milestones.filter(m => m.completed).length;

    openTaskModal(taskId); // Optimistic UI update

    google.script.run
      .withSuccessHandler(() => {
        loadKanban();
      })
      .withFailureHandler(err => {
        console.error('Milestone reorder error:', err);
      })
      .updateTaskMilestones(taskId, milestones, completedCount);

    draggedMilestoneIdx = null;
  }

  function addNote(taskId, fromModal = false) {
    const inputId = fromModal ? 'modal-note-input' : `note-input-${taskId}`;
    const input = document.getElementById(inputId);
    const text = input.value.trim();

    if (!text) return;

    showLoading();
    google.script.run
      .withSuccessHandler(newNotes => {
        input.value = '';
        if (fromModal) {
          // Update modal notes list immediately
          const task = state.tasks.find(t => t.id === taskId);
          task.notes = newNotes;
          openTaskModal(taskId);
        } else {
          loadKanban(); // Refresh card
        }
        hideLoading();
      })
      .withFailureHandler(err => {
        console.error('Add note error:', err);
        hideLoading();
      })
      .addNoteToTask(taskId, text);
  }

  function updateTotals() {
    const cols = ['todo', 'pending', 'development', 'testing', 'done', 'scrapyard'];
    cols.forEach(c => {
      const container = document.getElementById(`content-${c}`);
      const totalEl = document.getElementById(`total-${c}`);
      if (container && totalEl) {
        totalEl.textContent = container.children.length;
      }
    });
  }

  function moveTask(taskId, newStatus) {
    const card = document.querySelector(`[data-id="${taskId}"]`);
    const targetCol = document.getElementById(`content-${newStatus}`);
    if (card && targetCol) {
      targetCol.prepend(card); // Bring to top
      showLoading();
      google.script.run
        .withSuccessHandler(() => {
          updateTotals();
          hideLoading();
        })
        .withFailureHandler(err => {
          console.error('Move task error:', err);
          hideLoading();
        })
        .updateTaskStatus(taskId, newStatus);
    }
  }

  function loadNotebook(silent = false) {
    showLoading(silent);

    // Apply programmer-specific visual restrictions
    const formContainer = document.getElementById('idea-form-container');
    if (state.userRole === 'Programmer' && formContainer) {
      formContainer.classList.add('hidden');
    } else if (formContainer) {
      formContainer.classList.remove('hidden');
    }

    google.script.run
      .withSuccessHandler(ideas => {
        const container = document.getElementById('ideas-feed');
        container.innerHTML = ideas.map(i => {
          let takerBadge = '';
          let actionsHtml = '';

          if (i.taker) {
            takerBadge = `<span style="background:#10b981; color:white; padding:2px 8px; border-radius:12px; font-size:0.7rem; font-weight:800">Taken by: ${i.taker}</span>`;
          } else {
            takerBadge = `<span style="background:#f59e0b; color:white; padding:2px 8px; border-radius:12px; font-size:0.7rem; font-weight:800">Open for takers</span>`;
            if (state.userRole === 'Programmer') {
              actionsHtml += `<button class="btn-primary" style="margin-right:10px; padding: 6px 12px; width:auto; font-size:0.75rem;" onclick="takeIdea('${i.id}')">Take Idea</button>`;
            }
          }

          if (state.userRole === 'Admin') {
            actionsHtml += `<button class="btn-secondary" style="background:#ef4444; padding: 6px 12px; font-size:0.75rem;" onclick="deleteIdea('${i.id}')">Delete</button>`;
          }

          return `
          <div class="idea-card">
            <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px">
              <div style="display:flex; align-items:center; gap:10px;">
                <h3>${i.name}</h3>
                ${takerBadge}
              </div>
              <div style="font-size:0.75rem; color:#94a3b8; font-weight:600">${i.date}</div>
            </div>
            <p>${i.description}</p>
            
            ${i.details ? `<div style="margin: 10px 0; padding: 12px; background: #f1f5f9; border-radius: 8px; font-size: 0.85rem; color: #334155; border-left: 4px solid #3b82f6; line-height: 1.5;"><strong>Details:</strong><br>${i.details}</div>` : ''}

            <div class="pros-cons-grid">
              <div class="pros-box">
                <div class="pc-label">Pros</div>
                <div class="pc-content">${(i.pros || '').split('\n').map(line => line ? `✓ ${line}` : '').join('<br>')}</div>
              </div>
              <div class="cons-box">
                <div class="pc-label">Cons</div>
                <div class="pc-content">${(i.cons || '').split('\n').map(line => line ? `✗ ${line}` : '').join('<br>')}</div>
              </div>
            </div>
            
            <div style="display:flex; justify-content:flex-end; margin-top:15px; grid-column:1/-1;">
              ${actionsHtml}
            </div>
          </div>
        `;
        }).join('');
        hideLoading(silent);
      })
      .withFailureHandler(err => {
        console.error('Notebook load error:', err);
        hideLoading(silent);
      })
      .getIdeas();
  }

  function takeIdea(id) {
    if (confirm('Are you sure you want to take this idea?')) {
      showLoading();
      google.script.run
        .withSuccessHandler(() => {
          alert('You have successfully taken this idea!');
          loadNotebook();
          hideLoading();
        })
        .withFailureHandler(err => {
          console.error('Take idea error:', err);
          hideLoading();
        })
        .takeIdea(id, state.userName); // Backend function to be created
    }
  }

  function deleteIdea(id) {
    if (confirm('Are you sure you want to delete this idea?')) {
      showLoading();
      google.script.run
        .withSuccessHandler(() => {
          loadNotebook();
          hideLoading();
        })
        .withFailureHandler(err => {
          console.error('Delete idea error:', err);
          hideLoading();
        })
        .deleteIdea(id);
    }
  }

  function deleteTask(id) {
    if (confirm('Are you sure you want to delete this task?')) {
      showLoading();
      google.script.run
        .withSuccessHandler(() => {
          closeTaskModal();
          loadKanban();
          hideLoading();
        })
        .withFailureHandler(err => {
          console.error('Delete task error:', err);
          hideLoading();
        })
        .deleteTask(id);
    }
  }

  // --- FORM HANDLERS ---

  function submitTask(e) {
    e.preventDefault();
    const btn = e.target.querySelector('button[type="submit"]');
    btn.disabled = true;
    btn.textContent = 'DEPLOYING...';

    // Get selected assignees from custom multiselect
    const selectedAssignees = Array.from(document.querySelectorAll('#assignee-options input:checked')).map(cb => cb.value).join(', ');

    const payload = {
      title: document.getElementById('task-title').value,
      assignee: selectedAssignees,
      start: document.getElementById('task-date').value,
      description: document.getElementById('task-desc').value,
      milestones: JSON.stringify(currentMilestones)
    };

    showLoading();
    google.script.run
      .withSuccessHandler(() => {
        alert('Project Deployed Successfully');
        resetTaskForm();
        btn.disabled = false;
        btn.textContent = 'Create Task';
        switchView('kanban');
        hideLoading();
      })
      .withFailureHandler(err => {
        console.error('Task submission error:', err);
        alert('Error deploying task. Please check console.');
        btn.disabled = false;
        btn.textContent = 'Create Task';
        hideLoading();
      })
      .addTask(payload);
  }

  function submitIdea(e) {
    e.preventDefault();
    const payload = {
      name: document.getElementById('idea-title').value,
      description: document.getElementById('idea-desc').value,
      pros: document.getElementById('idea-pros').value,
      cons: document.getElementById('idea-cons').value,
      details: document.getElementById('idea-details').value
    };

    showLoading();
    google.script.run
      .withSuccessHandler(() => {
        alert('Concept Saved to Notebook');
        e.target.reset();
        loadNotebook();
        hideLoading();
      })
      .withFailureHandler(err => {
        console.error('Idea submission error:', err);
        hideLoading();
      })
      .addIdea(payload);
  }

  function submitStaff(e) {
    e.preventDefault();
    const payload = {
      name: document.getElementById('staff-name').value,
      email: document.getElementById('staff-email').value,
      role: document.getElementById('staff-role').value
    };

    showLoading();
    google.script.run
      .withSuccessHandler(() => {
        alert('Staff Member Registered Successfully');
        e.target.reset();
        loadStaffTable();
        hideLoading();
      })
      .withFailureHandler(err => {
        console.error('Staff submission error:', err);
        hideLoading();
      })
      .addStaff(payload);
  }

  // --- CONTEXT MENU LOGIC ---
  let currentContextTaskId = null;

  document.addEventListener('contextmenu', function (e) {
    const card = e.target.closest('.programmer-card') || e.target.closest('.task-card');
    if (card) {
      e.preventDefault(); // Prevent default browser menu
      currentContextTaskId = card.getAttribute('data-id');
      const menu = document.getElementById('task-context-menu');

      // Calculate position
      menu.style.left = `${e.pageX}px`;
      menu.style.top = `${e.pageY}px`;
      menu.classList.remove('hidden');
    }
  });

  document.addEventListener('click', function (e) {
    const menu = document.getElementById('task-context-menu');
    if (menu && !menu.contains(e.target)) {
      menu.classList.add('hidden');
      currentContextTaskId = null;
    }
  });

  function handleContextMenuEdit() {
    if (currentContextTaskId) {
      document.getElementById('task-context-menu').classList.add('hidden');
      openTaskModal(currentContextTaskId, true); // true = isEditMode
      currentContextTaskId = null;
    }
  }

  function handleContextMenuDelete() {
    if (currentContextTaskId) {
      document.getElementById('task-context-menu').classList.add('hidden');
      deleteTask(currentContextTaskId);
      currentContextTaskId = null;
    }
  }

  // Initialize
  window.onload = () => {
    showLoading();

    // 1. Fetch staff globally first so Edit Modals have the dropdown data ready
    google.script.run
      .withSuccessHandler(staff => {
        state.staff = staff;

        // 2. Fetch User Context
        google.script.run
          .withSuccessHandler(context => {
            if (!context.hasAccess) {
              document.getElementById('main-app').classList.add('hidden');
              document.getElementById('no-access-screen').classList.remove('hidden');
              document.getElementById('denied-email').textContent = context.email;
              hideLoading();
              return;
            }

            state.userName = context.name;
            state.isMainAdmin = context.isMainAdmin;
            state.actualRole = context.role;
            document.getElementById('main-app').classList.remove('hidden');
            changeRole(context.role);

            // If programmer, always start on Kanban (Dashboard)
            if (context.role === 'Programmer') {
              switchView('kanban');
            } else {
              switchView('dashboard');
            }
            hideLoading();

            // Auto-refresh every 30 seconds
            setInterval(() => {
              if (state.currentView === 'dashboard') loadDashboard(true);
              if (state.currentView === 'kanban') loadKanban(true);
              if (state.currentView === 'notebook') loadNotebook(true);
              if (state.currentView === 'admin') loadStaffTable(true);
            }, 30000);
          })
          .withFailureHandler(err => {
            console.error('User context error:', err);
            hideLoading();
          })
          .getUserContext();

      })
      .withFailureHandler(err => {
        console.error('Initial staff load error:', err);
        hideLoading();
      })
      .getStaff();
  };
</script>
